<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Snake Out of Hole</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            color: #ffffff;
            padding: 10px;
        }

        .game-container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            color: #4CAF50;
            margin-bottom: 15px;
            font-size: 28px;
            letter-spacing: 1px;
        }

        #gameCanvas {
            border: 3px solid #4CAF50;
            background: #000000;
            display: block;
            margin: 0 auto;
            width: 100%;
            height: auto;
            max-width: 400px;
        }

        .game-stats {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 8px 10px;
            background: #1e1e1e;
            border-radius: 8px;
        }

        .stat-item {
            font-size: 16px;
            font-weight: 600;
        }

        .level { color: #FFD600; }
        .score { color: #2196F3; }
        .target { color: #F44336; }

        .game-tips {
            color: #cccccc;
            font-size: 14px;
            margin: 10px 0;
        }

        .speed-tip {
            color: #FF9800;
            font-size: 12px;
            margin-top: 5px;
        }

        #startBtn {
            margin-top: 15px;
            padding: 10px 25px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background 0.2s ease;
            width: 100%;
        }

        #startBtn:hover {
            background: #388E3C;
        }

        @media (max-width: 400px) {
            h1 { font-size: 24px; }
            .stat-item { font-size: 14px; }
            .game-tips { font-size: 12px; }
            .speed-tip { font-size: 10px; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 Snake Out of Hole</h1>
        <div class="game-stats">
            <div class="stat-item level">Level: 1</div>
            <div class="stat-item score">Eaten: 0</div>
            <div class="stat-item target">Target: 3</div>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="game-tips">Use Arrow Keys to control the snake</div>
        <div class="speed-tip">Press Arrow Keys repeatedly to speed up the snake</div>
        <button id="startBtn">Start / Restart Game</button>
    </div>

    <script>
        // 配置常量
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        const baseSpeed = 180;
        const minSpeed = 80;
        const speedBoost = 20;

        // 全局变量
        let snake, dx, dy, food, score, level, target, gameLoop, gameOver;
        let currentSpeed, tempSpeed, keyPressed;

        // 计算关卡目标蛋数
        function getTargetEggs(level) {
            return Math.pow(3, level);
        }

        // 更新界面状态
        function updateStats() {
            document.querySelector('.level').textContent = `Level: ${level}`;
            document.querySelector('.score').textContent = `Eaten: ${score}`;
            document.querySelector('.target').textContent = `Target: ${target}`;
        }

        // 生成食物（避蛇身）
        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };

            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    spawnFood();
                    return;
                }
            }
        }

        // 绘制游戏元素
        function drawGame() {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制蛇（头身区分）
            snake.forEach((segment, index) => {
                if (index === 0) {
                    const headGradient = ctx.createLinearGradient(
                        segment.x * gridSize, segment.y * gridSize,
                        (segment.x + 1) * gridSize, (segment.y + 1) * gridSize
                    );
                    headGradient.addColorStop(0, '#2E7D32');
                    headGradient.addColorStop(1, '#81C784');
                    
                    ctx.fillStyle = headGradient;
                    ctx.beginPath();
                    ctx.roundRect(
                        segment.x * gridSize + 1, 
                        segment.y * gridSize + 1, 
                        gridSize - 3, 
                        gridSize - 3, 
                        4
                    );
                    ctx.fill();
                } else {
                    ctx.fillStyle = '#4CAF50';
                    ctx.fillRect(
                        segment.x * gridSize, 
                        segment.y * gridSize, 
                        gridSize - 2, 
                        gridSize - 2
                    );
                }
            });

            // 绘制食物
            ctx.fillStyle = '#FFD600';
            ctx.beginPath();
            ctx.roundRect(
                food.x * gridSize + 1, 
                food.y * gridSize + 1, 
                gridSize - 3, 
                gridSize - 3, 
                3
            );
            ctx.fill();
        }

        // 更新游戏循环速度
        function updateGameLoop() {
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(() => {
                updateGame();
                drawGame();
            }, tempSpeed);
        }

        // 游戏逻辑更新
        function updateGame() {
            if (gameOver) return;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // 撞墙判定
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                endGame("Hit the wall! Game Over!");
                return;
            }

            // 撞自身判定
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    endGame("Hit yourself! Game Over!");
                    return;
                }
            }

            snake.unshift(head);

            // 吃蛋逻辑
            if (head.x === food.x && head.y === food.y) {
                score++;
                updateStats();
                spawnFood();

                // 关卡升级
                if (score >= target) {
                    if (level >= 10) {
                        endGame("🎉 Congratulations! You beat all 10 levels!");
                        return;
                    }
                    level++;
                    currentSpeed = Math.max(minSpeed, baseSpeed - (level - 1) * 10);
                    tempSpeed = currentSpeed;
                    score = 0;
                    target = getTargetEggs(level);
                    updateStats();
                    alert(`✅ Level Up! Now Level ${level} - Collect ${target} eggs`);
                    updateGameLoop();
                }
            } else {
                snake.pop();
            }
        }

        // 游戏结束
        function endGame(message) {
            gameOver = true;
            clearInterval(gameLoop);
            alert(message);
        }

        // 按键按下（转向+加速）
        function handleKeyDown(e) {
            if (gameOver) return;
            keyPressed = true;
            
            tempSpeed = Math.max(minSpeed, tempSpeed - speedBoost);
            updateGameLoop();

            switch (e.key) {
                case 'ArrowLeft': if (dx !== 1) { dx = -1; dy = 0; } break;
                case 'ArrowRight': if (dx !== -1) { dx = 1; dy = 0; } break;
                case 'ArrowUp': if (dy !== 1) { dx = 0; dy = -1; } break;
                case 'ArrowDown': if (dy !== -1) { dx = 0; dy = 1; } break;
            }
        }

        // 按键松开（恢复速度）
        function handleKeyUp() {
            if (gameOver) return;
            keyPressed = false;
            
            setTimeout(() => {
                if (!keyPressed) {
                    tempSpeed = currentSpeed;
                    updateGameLoop();
                }
            }, 100);
        }

        // 绑定键盘事件
        document.addEventListener('keydown', handleKeyDown);
        document.addEventListener('keyup', handleKeyUp);

        // 初始化游戏
        function initGame() {
            if (gameLoop) clearInterval(gameLoop);
            
            // 初始3段蛇
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            
            dx = 1;
            dy = 0;
            score = 0;
            level = 1;
            target = getTargetEggs(level);
            gameOver = false;
            currentSpeed = baseSpeed;
            tempSpeed = baseSpeed;
            keyPressed = false;

            updateStats();
            spawnFood();
            drawGame();
            updateGameLoop();
        }

        // 绑定按钮+页面初始化
        document.getElementById('startBtn').addEventListener('click', initGame);

        window.onload = () => {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            level = 1;
            score = 0;
            target = 3;
            updateStats();
            spawnFood();
            drawGame();
        };
    </script>
</body>
</html>
