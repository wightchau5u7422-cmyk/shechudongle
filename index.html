<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Snake Out of Hole | TikTok</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* 修复：从center改为flex-start，避免内容溢出 */
            width: 100vw;
            height: 100vh;
            flex-direction: column;
            color: #ffffff;
            overflow: hidden;
            padding: 10px; /* 新增：添加内边距，防止内容贴边 */
        }

        .game-container {
            width: 100%;
            max-width: 450px; /* 固定最大宽度 */
            margin: 0 auto; /* 居中显示 */
            display: flex;
            flex-direction: column;
            height: 100%; /* 占满父容器高度 */
        }

        h1 {
            color: #4CAF50;
            font-size: 24px;
            text-align: center;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .game-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 8px 10px;
            background: #1e1e1e;
            border-radius: 8px;
            font-size: 14px;
        }

        .stat-item {
            font-weight: 600;
        }

        .level { color: #FFD600; }
        .score { color: #2196F3; }
        .target { color: #F44336; }

        #gameCanvasWrapper {
            position: relative;
            flex: 1; /* 占满剩余高度 */
            width: 100%;
            min-height: 200px; /* 新增：最小高度，确保画布显示 */
            margin-bottom: 15px; /* 新增：与方向键间距 */
        }

        #gameCanvas {
            border: 2px solid #4CAF50;
            background: #000000;
            width: 100%;
            height: 100%;
            display: block; /* 修复：消除默认行高偏移 */
        }

        /* 欢迎界面样式 */
        .welcome-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            cursor: pointer;
        }

        .welcome-title {
            font-size: 32px;
            color: #4CAF50;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(76, 175, 80, 0.8);
        }

        .welcome-subtitle {
            font-size: 18px;
            color: #FFD600;
            margin-bottom: 40px;
        }

        .welcome-btn {
            padding: 15px 40px;
            background: linear-gradient(to right, #4CAF50, #388E3C);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.5);
            transition: transform 0.2s ease;
        }

        .welcome-btn:active {
            transform: scale(0.95);
        }

        /* 失败提示样式 - 修复定位 */
        .fail-tip {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #FF4757;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            background: rgba(0,0,0,0.9);
            padding: 15px 20px;
            border-radius: 10px;
            border: 2px solid #FF4757;
            display: none;
            z-index: 10;
            width: 80%; /* 新增：限制宽度 */
            max-width: 300px; /* 新增：最大宽度 */
        }

        .fail-tip span {
            color: #FFD600;
            text-decoration: underline;
            cursor: pointer;
            display: inline-block;
            margin-top: 10px;
        }

        .game-tips {
            color: #cccccc;
            font-size: 12px;
            text-align: center;
            margin: 10px 0;
        }

        /* 方向键样式 - 重点恢复+优化 */
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 10px auto; /* 调整间距 */
            width: 180px;
            z-index: 5; /* 确保在最上层 */
        }

        .control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #1e1e1e;
            border: 2px solid #4CAF50;
            color: #ffffff;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 5px;
            transition: all 0.1s ease;
            touch-action: manipulation;
            outline: none; /* 移除点击轮廓 */
        }

        .control-btn:active {
            background: #4CAF50;
            transform: scale(0.95);
        }

        .btn-up {
            margin-bottom: 5px;
        }

        .btn-row {
            display: flex;
        }

        .btn-left, .btn-right {
            margin: 0 5px;
        }

        #startBtn {
            margin-top: 15px; /* 调整间距 */
            padding: 12px 0;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            transition: background 0.2s ease;
        }

        #startBtn:hover, #startBtn:active {
            background: #388E3C;
        }

        /* 响应式适配 - 确保小屏方向键正常显示 */
        @media (max-width: 375px) {
            .control-btn {
                width: 50px;
                height: 50px;
                font-size: 18px;
            }
            h1 {
                font-size: 20px;
            }
            .game-stats {
                font-size: 12px;
            }
            .fail-tip {
                font-size: 16px;
                padding: 10px 15px;
            }
            .welcome-title {
                font-size: 26px;
            }
            .welcome-subtitle {
                font-size: 16px;
            }
            .welcome-btn {
                padding: 12px 30px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 Snake Out of Hole</h1>
        <div class="game-stats">
            <div class="stat-item level">Level: 1</div>
            <div class="stat-item score">Eaten: 0</div>
            <div class="stat-item target">Target: 3</div>
        </div>
        <div id="gameCanvasWrapper">
            <canvas id="gameCanvas"></canvas>
            <!-- 欢迎界面 -->
            <div class="welcome-screen" id="welcomeScreen">
                <div class="welcome-title">🐍 Snake Game</div>
                <div class="welcome-subtitle">Click to Start Adventure</div>
                <button class="welcome-btn" id="welcomeStartBtn">Start Game</button>
            </div>
            <!-- 失败提示框 -->
            <div class="fail-tip" id="failTip">
                Game Over!<br>
                <span id="restartTip">Click to restart</span>
            </div>
        </div>
        <div class="game-tips">Auto move | Tap to change direction | Hold to speed up</div>
        
        <!-- 方向键区域 - 确保DOM结构完整 -->
        <div class="controls">
            <button class="control-btn btn-up" data-dir="up">↑</button>
            <div class="btn-row">
                <button class="control-btn btn-left" data-dir="left">←</button>
                <button class="control-btn btn-down" data-dir="down">↓</button>
                <button class="control-btn btn-right" data-dir="right">→</button>
            </div>
        </div>
        
        <button id="startBtn">Start / Restart Game</button>
    </div>

    <script>
        // ========== 基础配置 ==========
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const failTip = document.getElementById('failTip');
        const restartTip = document.getElementById('restartTip');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const welcomeStartBtn = document.getElementById('welcomeStartBtn');
        
        // 修复Canvas尺寸适配
        function resizeCanvas() {
            const wrapper = document.getElementById('gameCanvasWrapper');
            canvas.width = wrapper.offsetWidth;
            canvas.height = wrapper.offsetHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        const gridSize = Math.floor(canvas.width / 20);
        const tileCount = Math.floor(canvas.width / gridSize);
        
        // 速度配置
        const BASE_SPEED = 400;     
        const MIN_SPEED = 150;      
        const SPEED_BOOST_STEP = 5; 
        const BOOST_DECAY_TIME = 100;

        // ========== 游戏状态 ==========
        let snake = [];
        let dx = 1, dy = 0;
        let food = {};
        let score = 0;
        let level = 1;
        let target = 3;
        let gameOver = false;
        let gameRunning = false;
        
        // 核心定时器
        let autoMoveTimer = null;  
        let speedBoostTimer = null;
        let currentSpeed = BASE_SPEED;
        let isKeyHeld = false;
        let isDrawing = false;

        // 烟花相关配置
        let fireworks = [];
        let particles = [];

        // ========== 工具函数 ==========
        function getTargetEggs(level) {
            return Math.pow(3, level);
        }

        function updateStats() {
            document.querySelector('.level').textContent = `Level: ${level}`;
            document.querySelector('.score').textContent = `Eaten: ${score}`;
            document.querySelector('.target').textContent = `Target: ${target}`;
        }

        function spawnFood() {
            // 修复：食物生成在画布中间区域，避免边缘
            food = {
                x: Math.floor(Math.random() * (tileCount - 6)) + 3,
                y: Math.floor(Math.random() * (tileCount - 6)) + 3
            };

            // 避免食物生成在蛇身上
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    spawnFood();
                    return;
                }
            }
        }

        // 烟花类
        class Firework {
            constructor() {
                this.x = canvas.width / 2;
                this.y = canvas.height;
                this.speedY = -5 - Math.random() * 3;
                this.speedX = (Math.random() - 0.5) * 2;
                this.hue = Math.random() * 360;
                this.brightness = 50 + Math.random() * 50;
                this.gravity = 0.05;
                this.alpha = 1;
                this.decay = 0.01;
                this.exploded = false;
            }

            update() {
                if (!this.exploded) {
                    this.speedY += this.gravity;
                    this.y += this.speedY;
                    this.x += this.speedX;

                    if (this.speedY >= 0) {
                        this.exploded = true;
                        this.createParticles();
                    }
                } else {
                    this.alpha -= this.decay;
                }
            }

            createParticles() {
                const particleCount = 100;
                for (let i = 0; i < particleCount; i++) {
                    const particle = {
                        x: this.x,
                        y: this.y,
                        speedX: (Math.random() - 0.5) * 8,
                        speedY: (Math.random() - 0.5) * 8,
                        hue: this.hue,
                        brightness: 70 + Math.random() * 30,
                        alpha: 1,
                        decay: 0.02 + Math.random() * 0.01,
                        gravity: 0.1
                    };
                    particles.push(particle);
                }
            }

            draw() {
                if (!this.exploded && this.alpha > 0) {
                    ctx.save();
                    ctx.globalAlpha = this.alpha;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                    ctx.fillStyle = `hsl(${this.hue}, 100%, ${this.brightness}%)`;
                    ctx.fill();
                    ctx.restore();
                }
            }
        }

        function updateFireworks() {
            for (let i = fireworks.length - 1; i >= 0; i--) {
                const firework = fireworks[i];
                firework.update();
                firework.draw();

                if (firework.alpha <= 0) {
                    fireworks.splice(i, 1);
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                const particle = particles[i];
                particle.speedY += particle.gravity;
                particle.x += particle.speedX;
                particle.y += particle.speedY;
                particle.alpha -= particle.decay;

                if (particle.alpha > 0) {
                    ctx.save();
                    ctx.globalAlpha = particle.alpha;
                    ctx.beginPath();
                    ctx.arc(particle.x, particle.y, 2, 0, Math.PI * 2);
                    ctx.fillStyle = `hsl(${particle.hue}, 100%, ${particle.brightness}%)`;
                    ctx.fill();
                    ctx.restore();
                } else {
                    particles.splice(i, 1);
                }
            }

            if (fireworks.length > 0 || particles.length > 0) {
                requestAnimationFrame(updateFireworks);
            }
        }

        function launchFireworks(count = 5) {
            fireworks = [];
            particles = [];
            
            let launchInterval = setInterval(() => {
                fireworks.push(new Firework());
                count--;
                
                if (count <= 0) {
                    clearInterval(launchInterval);
                }
            }, 200);
            
            updateFireworks();
        }

        function showFailTip() {
            failTip.style.display = 'block';
        }

        function hideFailTip() {
            failTip.style.display = 'none';
        }

        function hideWelcomeScreen() {
            welcomeScreen.style.display = 'none';
        }

        // ========== 绘制函数 ==========
        function drawGame() {
            if (isDrawing) return;
            isDrawing = true;

            // 清屏
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制蛇
            snake.forEach((segment, index) => {
                if (index === 0) {
                    // 蛇头渐变效果
                    const gradient = ctx.createLinearGradient(
                        segment.x * gridSize, segment.y * gridSize,
                        (segment.x + 1) * gridSize, (segment.y + 1) * gridSize
                    );
                    gradient.addColorStop(0, '#2E7D32');
                    gradient.addColorStop(1, '#81C784');
                    
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.roundRect(
                        segment.x * gridSize + 1, 
                        segment.y * gridSize + 1, 
                        gridSize - 3, 
                        gridSize - 3, 
                        4
                    );
                    ctx.fill();
                } else {
                    // 蛇身
                    ctx.fillStyle = '#4CAF50';
                    ctx.fillRect(
                        segment.x * gridSize, 
                        segment.y * gridSize, 
                        gridSize - 2, 
                        gridSize - 2
                    );
                }
            });

            // 绘制食物
            ctx.fillStyle = '#FFD600';
            ctx.beginPath();
            ctx.roundRect(
                food.x * gridSize + 1, 
                food.y * gridSize + 1, 
                gridSize - 3, 
                gridSize - 3, 
                3
            );
            ctx.fill();

            isDrawing = false;
        }

        // ========== 核心移动逻辑 ==========
        function moveSnakeStep() {
            if (gameOver || !gameRunning || isDrawing) return;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // 撞墙判定
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver = true;
                stopAllTimers();
                showFailTip();
                return;
            }

            // 撞自身判定
            let hitSelf = false;
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    hitSelf = true;
                    break;
                }
            }
            if (hitSelf) {
                gameOver = true;
                stopAllTimers();
                showFailTip();
                return;
            }

            // 添加新蛇头
            snake.unshift(head);

            // 吃食物逻辑
            if (head.x === food.x && head.y === food.y) {
                score++;
                updateStats();
                spawnFood();

                if (score >= target) {
                    if (level >= 10) {
                        gameOver = true;
                        stopAllTimers();
                        launchFireworks(8);
                        setTimeout(() => {
                            alert("🎉 Congratulations! You beat all 10 levels!");
                        }, 1000);
                        return;
                    }
                    
                    level++;
                    currentSpeed = Math.max(MIN_SPEED, BASE_SPEED - (level - 1) * 10);
                    score = 0;
                    target = getTargetEggs(level);
                    updateStats();
                    
                    launchFireworks();
                    
                    setTimeout(() => {
                        alert(`✅ Level Up! Now Level ${level} - Collect ${target} eggs`);
                    }, 500);
                    
                    restartAutoMoveTimer();
                }
            } else {
                snake.pop();
            }

            // 异步绘制
            requestAnimationFrame(drawGame);
        }

        // ========== 定时器控制 ==========
        function startAutoMoveTimer() {
            if (autoMoveTimer) return;
            autoMoveTimer = setInterval(() => {
                moveSnakeStep();
            }, currentSpeed);
        }

        function restartAutoMoveTimer() {
            stopAutoMoveTimer();
            if (gameRunning && !gameOver) {
                startAutoMoveTimer();
            }
        }

        function stopAutoMoveTimer() {
            if (autoMoveTimer) {
                clearInterval(autoMoveTimer);
                autoMoveTimer = null;
            }
        }

        function stopAllTimers() {
            stopAutoMoveTimer();
            if (speedBoostTimer) {
                clearInterval(speedBoostTimer);
                speedBoostTimer = null;
            }
            isKeyHeld = false;
            isDrawing = false;
        }

        // ========== 加速控制 ==========
        function startSpeedBoost() {
            if (gameOver || !gameRunning || speedBoostTimer) return;
            
            speedBoostTimer = setInterval(() => {
                if (currentSpeed > MIN_SPEED) {
                    currentSpeed -= SPEED_BOOST_STEP;
                    restartAutoMoveTimer();
                } else {
                    clearInterval(speedBoostTimer);
                    speedBoostTimer = null;
                }
            }, BOOST_DECAY_TIME);
        }

        function stopSpeedBoost() {
            if (speedBoostTimer) {
                clearInterval(speedBoostTimer);
                speedBoostTimer = null;
            }
            const levelBaseSpeed = Math.max(MIN_SPEED, BASE_SPEED - (level - 1) * 10);
            if (currentSpeed < levelBaseSpeed) {
                currentSpeed = levelBaseSpeed;
                restartAutoMoveTimer();
            }
        }

        // ========== 方向控制 ==========
        function changeDirection(dir) {
            if (gameOver || !gameRunning) return;

            let directionChanged = false;
            switch (dir) {
                case 'up':
                    if (dy !== 1) { dx = 0; dy = -1; directionChanged = true; }
                    break;
                case 'down':
                    if (dy !== -1) { dx = 0; dy = 1; directionChanged = true; }
                    break;
                case 'left':
                    if (dx !== 1) { dx = -1; dy = 0; directionChanged = true; }
                    break;
                case 'right':
                    if (dx !== -1) { dx = 1; dy = 0; directionChanged = true; }
                    break;
            }

            if (directionChanged) {
                setTimeout(() => {
                    moveSnakeStep();
                }, 10);
                startSpeedBoost();
            }
        }

        // ========== 绑定事件 ==========
        function bindControls() {
            const controlBtns = document.querySelectorAll('.control-btn');
            
            controlBtns.forEach(btn => {
                let touchTimeout = null;
                
                // 鼠标按下
                btn.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    if (isKeyHeld) return;
                    isKeyHeld = true;
                    changeDirection(btn.dataset.dir);
                });
                
                // 触摸按下（移动端）
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    if (isKeyHeld || touchTimeout) return;
                    touchTimeout = setTimeout(() => {
                        isKeyHeld = true;
                        changeDirection(btn.dataset.dir);
                        touchTimeout = null;
                    }, 10);
                });

                // 松开事件
                const onKeyUp = () => {
                    isKeyHeld = false;
                    stopSpeedBoost();
                    if (touchTimeout) {
                        clearTimeout(touchTimeout);
                        touchTimeout = null;
                    }
                };

                btn.addEventListener('mouseup', onKeyUp);
                btn.addEventListener('mouseleave', onKeyUp);
                btn.addEventListener('touchend', onKeyUp);
            });

            // 失败提示重启
            restartTip.addEventListener('click', initGame);
            restartTip.addEventListener('touchstart', (e) => {
                e.preventDefault();
                initGame();
            });

            // 欢迎界面按钮
            welcomeStartBtn.addEventListener('click', () => {
                hideWelcomeScreen();
                initGame();
            });
            welcomeStartBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                hideWelcomeScreen();
                initGame();
            });

            // 欢迎界面任意点击
            welcomeScreen.addEventListener('click', () => {
                hideWelcomeScreen();
                initGame();
            });
            welcomeScreen.addEventListener('touchstart', (e) => {
                if (e.target === welcomeScreen) {
                    e.preventDefault();
                    hideWelcomeScreen();
                    initGame();
                }
            });
        }

        // ========== 游戏初始化 ==========
        function initGame() {
            gameOver = false;
            gameRunning = true;
            isKeyHeld = false;
            isDrawing = false;
            hideFailTip();
            stopAllTimers();
            
            // 修复：蛇初始位置移到画布中间偏左，避免直接撞墙
            const centerX = Math.floor(tileCount/2) - 5; // 左移5格
            const centerY = Math.floor(tileCount/2);
            snake = [
                { x: centerX, y: centerY },
                { x: centerX - 1, y: centerY },
                { x: centerX - 2, y: centerY }
            ];
            
            dx = 1; // 向右移动（有足够空间）
            dy = 0;
            score = 0;
            level = 1;
            target = getTargetEggs(level);
            currentSpeed = BASE_SPEED;

            updateStats();
            spawnFood();
            drawGame();
            startAutoMoveTimer();
        }

        // ========== 初始化 ==========
        bindControls();
        document.getElementById('startBtn').addEventListener('click', () => {
            hideWelcomeScreen();
            initGame();
        });

        // 页面加载初始化（仅绘制界面）
        window.onload = () => {
            const centerX = Math.floor(tileCount/2) - 5;
            const centerY = Math.floor(tileCount/2);
            snake = [
                { x: centerX, y: centerY },
                { x: centerX - 1, y: centerY },
                { x: centerX - 2, y: centerY }
            ];
            level = 1;
            score = 0;
            target = 3;
            updateStats();
            spawnFood();
            drawGame();
        };

        // 页面卸载清理定时器
        window.addEventListener('beforeunload', stopAllTimers);
    </script>
</body>
</html>
